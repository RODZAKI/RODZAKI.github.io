<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = window.location.pathname;
        if (path.startsWith('/site_builder')) {
          var newPath = path.replace('/site_builder', '');
          window.location.replace('/site_builder/#' + newPath);
        } else {
          window.location.replace('/');
        }
      })();
    </script>
  </head>
  <body></body>
</html>
