<body class="publications-directory">
<div class="site-frame"></div>

<div class="columns">

  <div class="column left outer">
    <div class="cap"></div>
    <div class="shaft"></div>
    <div class="plinth upper"></div>

  </div>

  <div class="column left inner">
    <div class="cap"></div>
    <div class="shaft"></div>
    <div class="plinth upper"></div>

  </div>

  <div class="column right inner">
    <div class="cap"></div>
    <div class="shaft"></div>

    <div class="plinth lower"></div>
  </div>

  <div class="column right outer">

</div>
    <div class="canon-header">
    <h1>⟁ MASTER INDEX — Canonical ⟁</h1>
    <div class="canon-meta" id="meta"></div>
  </div>

  <div id="content">Loading canonical index...</div>

<details style="margin-top: 40px;">
  <summary>Technical Details (Canonical JSON)</summary>
  <pre id="raw-json"></pre>
</details>
  <script>
    fetch('../canon/master-index.json')
      .then(response => response.json())
      .then(data => {
        document.getElementById('meta').innerText =
          "Version: " + data.meta.version +
          " | Governance: " + data.meta.governance +
          " | Last Updated: " + data.meta.lastUpdated;
// Structured Render
const container = document.getElementById("content");
container.innerHTML = "";

// --- Meta Header ---
const metaBlock = document.createElement("div");
metaBlock.innerHTML = `
  <h2>Master Index</h2>
  <p><strong>Surface Version:</strong> ${data.meta.surfaceVersion}</p>
  <p><strong>Internal Version:</strong> ${data.meta.version}</p>
  <p><strong>Last Updated:</strong> ${data.meta.lastUpdated}</p>
`;
container.appendChild(metaBlock);

// --- Milestones ---
if (data.milestoneTemplates) {
  const milestoneSection = document.createElement("div");
  milestoneSection.innerHTML = "<h3>Milestones</h3>";

  Object.entries(data.milestoneTemplates).forEach(([key, milestone]) => {
    const block = document.createElement("div");
    block.style.marginBottom = "20px";

    block.innerHTML = `
      <h4>${key}</h4>
      <p><strong>Status:</strong> ${milestone.status}</p>
      <p><strong>Purpose:</strong> ${milestone.purpose}</p>
    `;

    if (milestone.activationCriteria) {
      const ul = document.createElement("ul");
      milestone.activationCriteria.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        ul.appendChild(li);
      });
      block.appendChild(ul);
    }

    milestoneSection.appendChild(block);
  });

  container.appendChild(milestoneSection);
}
// --- Structural Systems Index ---
const index = data.structuralSystemsIndex;

console.log("STRUCTURAL INDEX:", index);

if (index) {
  const section = document.createElement("div");
  section.innerHTML = "<h3>Structural Systems Index</h3>";

  Object.entries(index).forEach(([tier, items]) => {
    const block = document.createElement("div");
    block.style.marginBottom = "20px";

    const title = document.createElement("h4");
    title.textContent = tier;
    block.appendChild(title);

    const ul = document.createElement("ul");

    items.forEach(item => {
      const li = document.createElement("li");
      li.textContent = item;
      ul.appendChild(li);
    });

    block.appendChild(ul);
    section.appendChild(block);
  });

  container.appendChild(section);
}
// Canonical Raw JSON
document.getElementById("raw-json").innerHTML =
  JSON.stringify(data, null, 2); 
      })
      .catch(error => {
        document.getElementById('content').innerText =
          "Error loading canonical index.";
        console.error(error);
      });
  </script>
</main>

</div>
