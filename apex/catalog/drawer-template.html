<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title id="drawer-title">Catalog Drawer</title>

<link rel="stylesheet" href="/assets/style.css">

</head>

<body class="site-frame">

<div class="site">

  <div class="cornice"></div>

  <div class="columns">

    <div class="column left outer">
      <div class="cap"></div>
      <div class="shaft"></div>
      <div class="plinth upper"></div>
      <div class="plinth lower"></div>
    </div>

    <div class="column left inner">
      <div class="cap"></div>
      <div class="shaft"></div>
      <div class="plinth upper"></div>
      <div class="plinth lower"></div>
    </div>

    <main class="drawer-chamber">

      <h1 id="drawer-title">Drawer</h1>

      <p id="drawer-description">
        Archive artifacts belonging to this structural layer.
      </p>

      <section class="drawer-artifacts">
        <ul id="artifact-list"></ul>
      </section>

      <div class="drawer-return">
        <a href="/apex/card-catalog.html">← Return to Catalog</a>
      </div>

    </main>

    <div class="column right inner">
      <div class="cap"></div>
      <div class="shaft"></div>
      <div class="plinth upper"></div>
      <div class="plinth lower"></div>
    </div>

    <div class="column right outer">
      <div class="cap"></div>
      <div class="shaft"></div>
      <div class="plinth upper"></div>
      <div class="plinth lower"></div>
    </div>

  </div>

</div>

<div class="stairs"></div>

</div>

</div>

<script src="/apex/catalog/drawer-loader.js"></script>

</body>
</html>
