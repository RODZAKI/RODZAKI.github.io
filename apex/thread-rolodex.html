<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/assets/style.css?v=51">
  <title>Thread Catalog — Rodzaki</title>
</head>

<body class="publications-directory rolodex">

  <!-- CORNICE -->
  <div class="cornice-bar"></div>

  <!-- COLUMNS -->
  <div class="columns">

    <!-- LEFT OUTER -->
    <div class="column left outer">
      <div class="cap"></div>
      <div class="shaft"></div>
      <div class="plinth upper"></div>
      <div class="plinth lower"></div>
    </div>

    <!-- RIGHT OUTER -->
    <div class="column right outer">
      <div class="cap"></div>
      <div class="shaft"></div>
      <div class="plinth upper"></div>
      <div class="plinth lower"></div>
    </div>

  </div>

  <!-- ROLODEX STAGE -->
  <div class="rolodex-stage">

      <div class="catalog-container">
          <div class="catalog-list" id="catalogList">
              <!-- Cards injected here -->
          </div>

          <div class="catalog-detail" id="catalogDetail">
              <div class="detail-placeholder">
                  Select a thread to view details.
              </div>
          </div>
      </div>

  </div>


</body>
</html>
