<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Redirect all 404s to index.html preserving path
      var path = window.location.pathname.replace('/site_builder', '');
      window.location.replace('/site_builder/' + '#'+ path);
    </script>
  </head>
  <body></body>
</html>
