<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var fullPath = window.location.pathname + window.location.search + window.location.hash;
        var base = '/site_builder';
        var newPath = fullPath.replace(base, '');
        window.location.replace(base + '/#' + newPath);
      })();
    </script>
  </head>
  <body><script src="/apex/ui/return-control.js"></script>
</body>
</html>
